name: Auto-Generate Picture Control Filters

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'bin/generate_filters.dart'
  workflow_dispatch: # Cho phép kích hoạt chạy thủ công từ giao diện GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    # Quyền ghi bắt buộc để GitHub Action có thể commit và push ngược lại repository
    permissions:
      contents: write

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Cài đặt thư viện (Dependencies)
        run: dart pub get

      - name: Chạy Script sinh mã màu (.NCP & README.md)
        run: |
          dart run bin/generate_filters.dart

      - name: Commit và Push các thay đổi về repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CUSTOMPC/ doc/
          
          # Chỉ commit và push khi thực sự có thay đổi
          if [ -n "$(git status --porcelain CUSTOMPC/ doc/)" ]; then
            git commit -m "chore: tự động cập nhật bộ lọc màu .NCP và ảnh xem trước [skip ci]"
            git push
          else
            echo "Không có thay đổi nào trong các bộ lọc màu, bỏ qua commit."
          fi

      - name: Tạo hoặc Cập nhật GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Film Recipes Pack"
          body: "Bản cập nhật tự động chứa toàn bộ 9 bộ lọc màu dạng file .NCP dưới dạng gói zip."
          draft: false
          prerelease: false
          files: CUSTOMPC.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


